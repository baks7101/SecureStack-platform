name: Full Security Scan (Reusable)

on:
  workflow_call:
    inputs:
      scan-path:
        description: 'Path to scan'
        required: false
        default: '.'
        type: string
      has-docker:
        description: 'Run container image scanning'
        required: false
        default: false
        type: boolean
      has-terraform:
        description: 'Run Terraform IaC scanning'
        required: false
        default: false
        type: boolean
      has-kubernetes:
        description: 'Run Kubernetes IaC scanning'
        required: false
        default: false
        type: boolean
      run-dast:
        description: 'Run DAST scanning'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

  # ─────────────────────────────────────────────
  # STAGE 1 — Secret Scanning
  # ─────────────────────────────────────────────
  secrets-scan:
    name: "Stage 1: Secret Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # STAGE 2 — SAST (CodeQL)
  # ─────────────────────────────────────────────
  sast-scan:
    name: "Stage 2: SAST (CodeQL)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-sast

  # ─────────────────────────────────────────────
  # STAGE 3 — Semgrep (Base + AI Rules)
  # ─────────────────────────────────────────────
  semgrep-scan:
    name: "Stage 3: Semgrep (OWASP Top 10 + OWASP LLM Top 10)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout SecureStack rules
        uses: actions/checkout@v4
        with:
          repository: baks7101/SecureStack-platform
          path: securestack-rules
          ref: main

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          path: target

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep with SecureStack rules
        run: |
          semgrep \
            --config securestack-rules/.semgrep/full-security-rules.yml \
            target/${{ inputs.scan-path }} \
            --sarif --output semgrep-results.sarif || true

      - name: Upload Semgrep SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep-full

      - name: Fail on ERROR severity findings
        run: |
          semgrep \
            --config securestack-rules/.semgrep/full-security-rules.yml \
            target/${{ inputs.scan-path }} --error

  # ─────────────────────────────────────────────
  # STAGE 4 — SCA (Trivy dependency scan)
  # ─────────────────────────────────────────────
  sca-scan:
    name: "Stage 4: SCA — Dependency Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ inputs.scan-path }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: sarif
          output: trivy-sca-results.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-sca-results.sarif
          category: trivy-sca

  # ─────────────────────────────────────────────
  # STAGE 5 — Dependency Pin Check
  # ─────────────────────────────────────────────
  dependency-pin-check:
    name: "Stage 5: Dependency Pin Check"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for unpinned dependencies
        run: |
          if [ -f "package.json" ]; then
            echo "Checking package.json for unpinned dependencies..."
            if grep -E '"[^"]+": "[\\^~]' package.json; then
              echo "FAIL: Unpinned dependencies found (^ or ~ prefix)"
              echo "All dependencies must be pinned to exact versions"
              echo "OWASP LLM05 - Supply Chain Vulnerability"
              exit 1
            else
              echo "PASS: All dependencies are pinned"
            fi
          fi
          if [ -f "requirements.txt" ]; then
            echo "Checking requirements.txt..."
            if grep -E '^[^=]+$|>=|<=' requirements.txt; then
              echo "FAIL: Unpinned Python dependencies found"
              exit 1
            else
              echo "PASS: All Python dependencies are pinned"
            fi
          fi

  # ─────────────────────────────────────────────
  # STAGE 6 — IaC Scanning (optional)
  # ─────────────────────────────────────────────
  iac-scan:
    name: "Stage 6: IaC Scan (Checkov)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    if: ${{ inputs.has-terraform || inputs.has-kubernetes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Scan Terraform
        if: ${{ inputs.has-terraform }}
        run: |
          checkov -d ./terraform \
            --framework terraform \
            --output sarif \
            --output-file-path checkov-terraform.sarif || true

      - name: Scan Kubernetes
        if: ${{ inputs.has-kubernetes }}
        run: |
          checkov -d ./k8s \
            --framework kubernetes \
            --output sarif \
            --output-file-path checkov-k8s.sarif || true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('checkov-terraform.sarif') != ''
        with:
          sarif_file: checkov-terraform.sarif
          category: checkov-iac

  # ─────────────────────────────────────────────
  # STAGE 7 — Container Image Scanning (optional)
  # ─────────────────────────────────────────────
  container-scan:
    name: "Stage 7: Container Image Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: [sast-scan, sca-scan]
    if: ${{ inputs.has-docker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and scan API image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: securestack-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

  # ─────────────────────────────────────────────
  # STAGE 8 — CLAUDE.md Governance Check
  # ─────────────────────────────────────────────
  claude-md-check:
    name: "Stage 8: CLAUDE.md Governance Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check CLAUDE.md exists and is not empty
        run: |
          if [ ! -f "CLAUDE.md" ]; then
            echo "FAIL: CLAUDE.md not found"
            echo "Every repo using AI agents must have a CLAUDE.md"
            echo "governance file defining security rules for the agent"
            exit 1
          fi
          if [ ! -s "CLAUDE.md" ]; then
            echo "FAIL: CLAUDE.md exists but is empty"
            exit 1
          fi
          echo "PASS: CLAUDE.md exists"
          echo "Size: $(wc -c < CLAUDE.md) bytes"

  # ─────────────────────────────────────────────
  # STAGE 9 — Cisco AI Skill Scanner
  # ─────────────────────────────────────────────
  skill-scan:
    name: "Stage 9: Cisco AI Skill Scanner"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cisco AI Skill Scanner
        run: pip install cisco-ai-skill-scanner

      - name: Scan Cursor agent skills
        run: |
          if [ -d ".cursor/skills" ]; then
            echo "Scanning Cursor agent skills..."
            cisco-ai-skill-scanner scan .cursor/skills \
              --sarif --output skill-scan-results.sarif
          else
            echo "No .cursor/skills directory — skipping"
          fi

      - name: Upload Skill Scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('skill-scan-results.sarif') != ''
        with:
          sarif_file: skill-scan-results.sarif
          category: cisco-skill-scanner

  # ─────────────────────────────────────────────
  # STAGE 10 — DAST (optional)
  # ─────────────────────────────────────────────
  dast-scan:
    name: "Stage 10: DAST (OWASP ZAP)"
    runs-on: ubuntu-latest
    needs: [security-gate]
    if: ${{ inputs.run-dast }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application
        run: |
          docker compose up -d --build
          echo "Waiting for app to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "App is ready"
              break
            fi
            echo "Attempt $i/30 — waiting 5s..."
            sleep 5
          done

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

      - name: Stop application
        if: always()
        run: docker compose down

  # ─────────────────────────────────────────────
  # STAGE 11 — Security Gate (final)
  # ─────────────────────────────────────────────
  security-gate:
    name: "Stage 11: Security Quality Gate"
    runs-on: ubuntu-latest
    needs:
      - secrets-scan
      - sast-scan
      - semgrep-scan
      - sca-scan
      - dependency-pin-check
      - claude-md-check
      - skill-scan
    steps:
      - name: Security gate passed
        run: |
          echo "════════════════════════════════════════════"
          echo "   FULL SECURITY GATE — ALL CHECKS PASSED"
          echo "════════════════════════════════════════════"
          echo ""
          echo "  Stage 1:  Gitleaks          — secrets clear"
          echo "  Stage 2:  CodeQL            — SAST complete"
          echo "  Stage 3:  Semgrep           — OWASP Top 10 + LLM Top 10 clear"
          echo "  Stage 4:  Trivy SCA         — dependencies scanned"
          echo "  Stage 5:  Dep pin check     — all versions pinned"
          echo "  Stage 6:  IaC scan          — Terraform/K8s scanned"
          echo "  Stage 7:  Container scan    — images scanned"
          echo "  Stage 8:  CLAUDE.md         — governance file present"
          echo "  Stage 9:  Cisco skills      — agent skills scanned"
          echo "  Stage 10: DAST              — runtime scan complete"
          echo ""
          echo "  PR is cleared for merge."
          echo "════════════════════════════════════════════"