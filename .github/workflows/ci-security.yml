name: SecureStack CI — Security Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

permissions:
  contents: read
  security-events: write
  actions: read

env:
  API_IMAGE: securestack-api
  FRONTEND_IMAGE: securestack-frontend

jobs:

  secrets-scan:
    name: "Stage 1: Secret Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: ./.github/actions/gitleaks-scan

  sast-scan:
    name: "Stage 2: SAST (CodeQL)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run CodeQL
        uses: ./.github/actions/codeql-sast
        with:
          language: 'javascript'

  sca-api:
    name: "Stage 3a: SCA — API Dependencies"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan API dependencies
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: 'fs'
          target: './app/api'

  sca-frontend:
    name: "Stage 3b: SCA — Frontend Dependencies"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan Frontend dependencies
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: 'fs'
          target: './app/frontend'

  build-and-scan-images:
    name: "Stage 4: Build and Scan Container Images"
    runs-on: ubuntu-latest
    needs: [sast-scan, sca-api, sca-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./app/api
          push: false
          load: true
          tags: ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          push: false
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.API_IMAGE }}:${{ github.sha }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.FRONTEND_IMAGE }}:${{ github.sha }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

      - name: Generate API SBOM
        uses: ./.github/actions/sbom-generate
        with:
          target: '${{ env.API_IMAGE }}:${{ github.sha }}'
          output-file: 'sbom-api.cdx.json'
          artifact-name: 'sbom-api'

      - name: Generate Frontend SBOM
        uses: ./.github/actions/sbom-generate
        with:
          target: '${{ env.FRONTEND_IMAGE }}:${{ github.sha }}'
          output-file: 'sbom-frontend.cdx.json'
          artifact-name: 'sbom-frontend'

  iac-terraform:
    name: "Stage 5a: IaC Scan — Terraform"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan Terraform
        uses: ./.github/actions/checkov-iac
        with:
          directory: './terraform'
          framework: 'terraform'

  iac-kubernetes:
    name: "Stage 5b: IaC Scan — Kubernetes"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan Kubernetes manifests
        uses: ./.github/actions/checkov-iac
        with:
          directory: './k8s'
          framework: 'kubernetes'

  security-gate:
    name: "Stage 6: Security Quality Gate"
    runs-on: ubuntu-latest
    needs: [build-and-scan-images, iac-terraform, iac-kubernetes, policy-check]
    steps:
      - name: Security gate passed
        run: |
          echo "============================================"
          echo "  SECURITY QUALITY GATE: ALL CHECKS PASSED"
          echo "============================================"
          echo ""
          echo "  Gitleaks:     Secrets scan clear"
          echo "  CodeQL:       SAST analysis complete"
          echo "  Trivy SCA:    Dependency scan complete"
          echo "  Trivy IMG:    Container scan complete"
          echo "  Checkov:      IaC scan complete"
          echo "  SBOM:         Generated and archived"
          echo ""
          echo "  Ready for DAST and deployment"
          echo "============================================"

  dast-scan:
    name: "Stage 7: DAST (OWASP ZAP)"
    runs-on: ubuntu-latest
    needs: [security-gate]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application for DAST scanning
        run: |
          docker compose up -d --build
          echo "Waiting for application to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:5000/api/search/admin/stats > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Attempt $i/30 — waiting 5s..."
            sleep 5
          done

      - name: Run ZAP baseline scan against API
        uses: ./.github/actions/zap-dast
        with:
          target-url: 'http://localhost:5000'
          scan-type: 'baseline'

      - name: Stop application
        if: always()
        run: docker compose down
