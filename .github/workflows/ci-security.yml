name: SecureStack CI — Security Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

permissions:
  contents: read
  security-events: write
  actions: read

env:
  API_IMAGE: securestack-api
  FRONTEND_IMAGE: securestack-frontend

jobs:

  secrets-scan:
    name: "Stage 1: Secret Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: ./.github/actions/gitleaks-scan

  sast-scan:
    name: "Stage 2: SAST (CodeQL)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run CodeQL
        uses: ./.github/actions/codeql-sast
        with:
          language: 'javascript'

  sca-scan:
    name: "Stage 3: SCA — Dependencies (Trivy)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan API dependencies
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: 'fs'
          target: './app/api'

      - name: Scan Frontend dependencies
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: 'fs'
          target: './app/frontend'

  build-and-scan-images:
    name: "Stage 4: Build and Scan Container Images"
    runs-on: ubuntu-latest
    needs: [sast-scan, sca-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./app/api
          push: false
          load: true
          tags: ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          push: false
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: 'image'
          target: '${{ env.API_IMAGE }}:${{ github.sha }}'

      - name: Scan Frontend image
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: 'image'
          target: '${{ env.FRONTEND_IMAGE }}:${{ github.sha }}'

      - name: Generate API SBOM
        uses: ./.github/actions/sbom-generate
        with:
          target: '${{ env.API_IMAGE }}:${{ github.sha }}'
          output-file: 'sbom-api.cdx.json'

      - name: Generate Frontend SBOM
        uses: ./.github/actions/sbom-generate
        with:
          target: '${{ env.FRONTEND_IMAGE }}:${{ github.sha }}'
          output-file: 'sbom-frontend.cdx.json'

  iac-scan:
    name: "Stage 5: IaC Scan (Checkov)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan Terraform
        uses: ./.github/actions/checkov-iac
        with:
          directory: './terraform'
          framework: 'terraform'

      - name: Scan Kubernetes manifests
        uses: ./.github/actions/checkov-iac
        with:
          directory: './k8s'
          framework: 'kubernetes'

  security-gate:
    name: "Stage 6: Security Quality Gate"
    runs-on: ubuntu-latest
    needs: [build-and-scan-images, iac-scan]
    steps:
      - name: Security gate passed
        run: |
          echo "============================================"
          echo "  SECURITY QUALITY GATE: ALL CHECKS PASSED"
          echo "============================================"
          echo ""
          echo "  Gitleaks:  Secrets scan clear"
          echo "  CodeQL:    SAST analysis complete"
          echo "  Trivy SCA: Dependency scan passed"
          echo "  Trivy IMG: Container scan passed"
          echo "  Checkov:   IaC scan passed"
          echo "  SBOM:      Generated and archived"
          echo ""
          echo "  Ready for DAST and deployment"
          echo "============================================"
