name: SecureStack CI — Security Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  full-security:
    name: Full Security Gate
    uses: ./.github/workflows/full-security-scan.yml
    with:
      scan-path: "."
      has-docker: true
      has-terraform: true
      has-kubernetes: true
      run-dast: true
    secrets: inherit
