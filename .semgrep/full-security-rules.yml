rules:

  - id: sql-injection
    pattern-either:
      - pattern: $DB.query($A + $B)
    message: SQL injection detected. Use parameterised queries. OWASP A03:2021.
    languages: [javascript, typescript]
    severity: ERROR

  - id: eval-injection
    pattern: eval($INPUT)
    message: eval() with dynamic input is a code injection vector. OWASP A03.
    languages: [javascript, typescript]
    severity: ERROR

  - id: path-traversal
    pattern-either:
      - pattern: fs.readFile($REQ.params.$VAR, ...)
      - pattern: fs.readFileSync($REQ.params.$VAR, ...)
    message: Path traversal risk. Validate file paths before use. OWASP A01:2021.
    languages: [javascript, typescript]
    severity: ERROR

  - id: prompt-injection-concat
    pattern: "`...$USERINPUT...`"
    message: Prompt injection risk. Use roles array not string concatenation. OWASP LLM01.
    languages: [javascript, typescript]
    severity: ERROR

  - id: llm-output-eval
    pattern: eval($LLM_RESPONSE)
    message: LLM output passed to eval(). Never execute LLM responses. OWASP LLM02.
    languages: [javascript, typescript]
    severity: ERROR

  - id: jwt-hardcoded-fallback
    pattern: $SECRET = process.env.$VAR || "$DEFAULT"
    message: Hardcoded JWT secret fallback detected. Fail loudly if secret missing. OWASP LLM06.
    languages: [javascript, typescript]
    severity: ERROR

  - id: todo-auth-bypass
    pattern-regex: "TODO.*auth|auth.*TODO|skip.*auth|auth.*later"
    message: TODO auth comment detected. Implement auth before merge. OWASP LLM08.
    languages: [javascript, typescript]
    severity: WARNING

  - id: missing-rate-limit
    pattern: "router.post($PATH, async ($REQ, $RES) => {...})"
    message: LLM endpoint missing rate limiting. OWASP LLM04.
    languages: [javascript, typescript]
    severity: WARNING
