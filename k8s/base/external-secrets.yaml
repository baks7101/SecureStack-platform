# External Secrets Operator — pulls secrets from AWS Secrets Manager into K8s
# The pod never sees AWS credentials — it just reads a K8s secret that ESO keeps in sync

# SecretStore — tells ESO where to find secrets (AWS Secrets Manager in eu-west-2)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: securestack-production
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-2
      auth:
        jwt:
          serviceAccountRef:
            name: securestack-api
---
# ExternalSecret for database credentials
# ESO reads from AWS Secrets Manager and creates a K8s secret automatically
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: securestack-production
  labels:
    app: securestack
    tier: api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: securestack-db-secrets
    creationPolicy: Owner
  data:
    - secretKey: MYSQL_ROOT_PASSWORD
      remoteRef:
        key: securestack/db-credentials
        property: root_password
    - secretKey: DB_HOST
      remoteRef:
        key: securestack/db-credentials
        property: host
    - secretKey: DB_USER
      remoteRef:
        key: securestack/db-credentials
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: securestack/db-credentials
        property: password
    - secretKey: DB_NAME
      remoteRef:
        key: securestack/db-credentials
        property: database
---
# ExternalSecret for API secrets (JWT)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-secrets
  namespace: securestack-production
  labels:
    app: securestack
    tier: api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: securestack-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: securestack/jwt-secret
        property: secret
