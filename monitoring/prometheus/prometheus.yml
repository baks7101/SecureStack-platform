# SecureStack Prometheus Configuration
# Scrapes metrics from the API, frontend, and K8s cluster
# Includes security-specific alerting rules

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

scrape_configs:
  # Scrape the Node.js API for application metrics
  - job_name: 'securestack-api'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - securestack-production
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_tier]
        regex: api
        action: keep
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

  # Scrape Kubernetes node metrics
  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  # Scrape kube-state-metrics for pod/deployment health
  - job_name: 'kube-state-metrics'
    static_configs:
      - targets: ['kube-state-metrics:8080']
