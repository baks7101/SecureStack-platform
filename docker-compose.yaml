services:
  db:
    image: mysql:8.0
    container_name: securestack-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: crud_app
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apppassword}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securestack-net

  api:
    build:
      context: ./app/api
      dockerfile: Dockerfile
    container_name: securestack-api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-apppassword}
      DB_NAME: crud_app
      JWT_SECRET: ${JWT_SECRET:-local-dev-only-change-in-production}
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - securestack-net

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API: http://localhost:5000
    container_name: securestack-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - securestack-net

  prometheus:
    image: prom/prometheus:latest
    container_name: securestack-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus-local.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - securestack-net

  grafana:
    image: grafana/grafana:latest
    container_name: securestack-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: SecureStack2026!
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/security-dashboard.json:/var/lib/grafana/dashboards/security-dashboard.json
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - securestack-net

volumes:
  db-data:
  prometheus-data:
  grafana-data:

networks:
  securestack-net:
    driver: bridge
