server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "0" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://backend-svc:5000;" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Serve static assets with long cache
  location ~* \.(js|css|json|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    try_files $uri =404;
    access_log off;
    expires 1y;
  }

  # Proxy API requests to backend service
  location /api/ {
    proxy_pass http://backend-svc:5000/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # Security: limit request size to prevent DoS
    client_max_body_size 1m;
  }

  # Fallback for React Router (SPA routes)
  location / {
    try_files $uri /index.html;
  }

  # Block access to hidden files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
