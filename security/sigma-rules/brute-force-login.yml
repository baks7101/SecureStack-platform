# Sigma Rule: Brute Force Login Detection
# Detects multiple failed authentication attempts from the same source
title: Brute Force Login Attempt
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: production
level: high
description: >
  Detects 10+ failed login attempts within 5 minutes from the same IP.
  Indicates credential stuffing or brute force attack.
  Business impact: Successful brute force leads to account takeover,
  costing avg £3,200 per incident in support and remediation.
author: SecureStack Security Team
date: 2026/04/16
tags:
  - attack.credential_access
  - attack.t1110.001
  - mitre.t1110
logsource:
  category: webserver
  product: nginx
detection:
  selection:
    status: 401
    request_path: '/api/auth/login'
  timeframe: 5m
  condition: selection | count(source_ip) > 10
falsepositives:
  - Users who genuinely forgot their password
  - Automated health checks with wrong credentials
